    name: Corebridge Financial Website
    description: >-
      Corebridge Financial's public website serves as the institutional and
      consumer entry point for retirement, insurance, and annuity solutions.
      Authenticated portals are provided for annuity holders, life insurance
      consumers, retirement services participants, plan sponsors (SponsorFIT),
      and consultants (ConsultantDIRECT). No public REST API is published.
