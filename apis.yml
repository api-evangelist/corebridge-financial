aid: corebridge-financial
name: Corebridge Financial
kind: company
description: >-
  Corebridge Financial (formerly AIG Life and Retirement) is one of the largest
  and most established retirement and insurance solutions providers in the
  United States. Spun off from AIG in September 2022 in the largest IPO of that
  year, Corebridge provides retirement solutions, life insurance, fixed and
  variable annuities, and institutional products. The company is a leading
  retirement plan provider for K-12 schools, healthcare, government, higher
  education, and other not-for-profit institutions. Corebridge Financial does
  not currently publish a public developer API; participant and plan sponsor
  access is provided through dedicated portals.
